<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Static Site</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #232f3e; } /* AWS Squid Ink color */
        p { color: #666; }
        .status { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>S3 Static Website</h1>
        <p>Status: <span class="status">Live & Secure</span></p>
        <hr>
        <p>Deployed via <strong>Terraform</strong></p>
    </div>
</body>
</html>
